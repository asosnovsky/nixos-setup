[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "niri-touchscreen-gestures"
version = "0.1.0"
description = "Touchscreen gesture detector for niri (2/3/4-finger swipes → niri actions). Just run `niri-touchscreen-gestures` — no config needed."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Ari Sosnovsky", email = "ariel@sosnovsky.ca" }]
dependencies = [
    "evdev>=1.7",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "typing-extensions>=4.0",
]

[project.scripts]
niri-touchscreen-gestures = "niri_touchscreen_gestures.main:main_runtime"

[tool.hatch.build.targets.wheel]
packages = ["niri_touchscreen_gestures"]
